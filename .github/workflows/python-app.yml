# .github/workflows/python-app.yml

name: Python Application CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: 📥 リポジトリをチェックアウト
      uses: actions/checkout@v3

    - name: 🐍 Pythonをセットアップ
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 📦 依存関係をインストール
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: ✅ 動作確認（CLI）
      run: |
        python --version
        echo "PyQtアプリの基本動作確認用にファイル構成チェックを実施"
        ls -la

    # 必要に応じてPyQtのテスト用スクリプトを呼び出すことも可能
    # - name: ✅ GUIテスト（オプション）
    #   run: |
    #     xvfb-run python test_gui.py

    - name: 📤 成果物のアーティファクト保存（例）
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: liveleaper-source
        path: |
          *.py
          README.md
